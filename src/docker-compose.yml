services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: tictactoe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 20062009
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tictactoe"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: api-gateway
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app-logs:/app/logs
  
  migrations:
    build:
      context: .
      dockerfile: ./Dockerfile.migrations
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  postgres-data:
  app-logs:
